<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Appraisal ERP - Cloud Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --fi-color: #16a34a; 
            --li-color: #eab308; 
            --pi-color: #f97316; 
            --ny-color: #dc2626; 
            --nr-color: #cbd5e1; 
            --primary: #0f172a; 
            --secondary: #64748b; 
            --border-color: #e2e8f0; 
            --radius-md: 6px; 
            --radius-lg: 12px; 
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            color: #1e293b; 
            margin: 0; 
            padding: 30px; 
            font-size: 12px; 
            background-color: #f1f5f9; 
        }
        
        .dashboard-container { 
            max-width: 1750px; 
            margin: 0 auto; 
            background: white; 
            padding: 35px; 
            border-radius: var(--radius-lg); 
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05); 
        }
        
        .header-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            align-items: center; 
            background-color: #0f172a; 
            padding: 20px; 
            border-radius: var(--radius-lg); 
            text-align: center; 
            margin-bottom: 25px; 
        }
        
        .header-titles h1 { font-size: 24px; color: #ffffff; margin: 0; font-weight: 800; }
        .header-titles p { color: #94a3b8; margin: 5px 0 0 0; }
        
        .client-bar {
            background: #1e293b;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }
        
        .client-bar label { font-weight: bold; font-size: 13px; }
        .client-bar input { width: 220px; background: #0f172a; color: white; border: 1px solid #475569; padding: 6px 10px; border-radius: var(--radius-md); font-weight: bold; outline: none; }
        .status-indicator { margin-left: auto; font-weight: bold; color: #38bdf8; display: flex; align-items: center; gap: 6px; }

        .tabs-container { display: flex; gap: 4px; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); }
        .tab-btn { background: #f8fafc; border: 1px solid var(--border-color); padding: 12px 18px; font-weight: 600; color: var(--secondary); cursor: pointer; border-radius: 6px 6px 0 0; }
        .tab-btn.active { color: white; background: var(--primary); }
        .tab-content { display: none; } 
        .tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th, td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); text-align: left; vertical-align: middle; }
        th { background: #f8fafc; color: #475569; font-size: 10px; text-transform: uppercase; }
        
        .row-parent { background-color: #f8fafc; font-weight: bold; border-left: 4px solid #3b71ca; }
        .row-child td:first-child { padding-left: 25px; }
        
        .module-row-header { background-color: #3b71ca; color: white; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0; }
        .btn-action { padding: 5px 10px; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; color: white; background: #0f172a; transition: background 0.2s; }
        .btn-action:hover { background: #1e293b; }
        
        .badge-calculated { display: inline-block; padding: 4px 8px; font-weight: bold; border-radius: 4px; text-align: center; border: 1px solid #475569; min-width: 50px; text-transform: uppercase; }
        select, textarea, input { width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 11px; box-sizing: border-box; }
        select { font-weight: bold; cursor: pointer; }
        
        .badge-FI { background-color: #f0fdf4 !important; color: var(--fi-color) !important; border-color: #bbf7d0 !important; }
        .badge-LI { background-color: #fef9c3 !important; color: #a16207 !important; border-color: #fef08a !important; }
        .badge-PI { background-color: #fff7ed !important; color: var(--pi-color) !important; border-color: #fed7aa !important; }
        .badge-NY { background-color: #fef2f2 !important; color: var(--ny-color) !important; border-color: #fecaca !important; }
        .badge-NR { background-color: #e2e8f0 !important; color: #475569 !important; border-color: #cbd5e1 !important; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-grid">
            <div class="header-titles">
                <h1>Appraisal de Adopción de Procesos ERP</h1>
                <p>Ecosistema Conectado a la Nube (Supabase Realtime)</p>
            </div>
        </div>

        <div class="client-bar">
            <label>📂 ID Único Cliente:</label>
            <input type="text" id="client-id-input" value="demo" onchange="loadData()">
            <button class="btn-action" style="background: #3b71ca;" onclick="loadData()">⚡ Sincronizar Cliente</button>
            <div class="status-indicator" id="cloud-status">⏳ Inicializando...</div>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab(event, 'pestana-modulos')">📦 Módulos del Sistema</button>
        </div>

        <div id="pestana-modulos" class="tab-content active">
            <div id="block-container-nucleares"></div>
        </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE CRUCIAL DE SUPABASE ===
        const supabaseUrl = 'https://ezzuuffneepigvinjqxi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6enV1ZmZuZWVwaWd2aW5qcXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDQyMjYsImV4cCI6MjA5ODYyMDIyNn0.Tv3yxI0s5iyw53F4DQN7iLMB4v_9ZUnhvtAQpKbVG5w';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const modKey = 'trafico'; 

        function getClienteId() {
            return document.getElementById('client-id-input').value.trim() || 'demo';
        }

        // Cargar datos desde la base de datos cloud filtrando por cliente
        async function loadData() {
            const statusEl = document.getElementById('cloud-status');
            statusEl.innerText = "🔄 Sincronizando...";
            statusEl.style.color = "#38bdf8";
            
            const cliente = getClienteId();

            try {
                let { data: conceptos, error } = await _supabase
                    .from('conceptos_padre')
                    .select(`
                        id, modulo_key, texto, notas, eval_manual,
                        subconceptos_hijo ( id, texto, eval, notas )
                    `)
                    .eq('modulo_key', modKey)
                    .eq('cliente_id', cliente);

                if (error) throw error;

                renderTable(conceptos);
                statusEl.innerText = "🟢 Conectado Cloud";
                statusEl.style.color = "#16a34a";
            } catch (err) {
                console.error("Error cargando módulos de Supabase:", err);
                statusEl.innerText = "🔴 Error de Red";
                statusEl.style.color = "#dc2626";
            }
        }

        // Lógica de cálculo estricto (Eslabón más débil / No promedios)
        function calculateStrictMaturity(parent) {
            if (!parent.subconceptos_hijo || parent.subconceptos_hijo.length === 0) {
                return parent.eval_manual || "NR";
            }
            let hasNY = false, hasPI = false, hasLI = false, fiCount = 0;
            let total = parent.subconceptos_hijo.length;

            parent.subconceptos_hijo.forEach(child => {
                if (child.eval === "NY") hasNY = true;
                else if (child.eval === "PI") hasPI = true;
                else if (child.eval === "LI") hasLI = true;
                else if (child.eval === "FI") fiCount++;
            });

            if (hasNY) return "NY";
            if (hasPI) return "PI";
            if (hasLI || (fiCount > 0 && fiCount < total)) return "LI";
            if (fiCount === total) return "FI";
            return "NR";
        }

        // Renderizar la tabla dinámica jerárquica
        function renderTable(conceptos) {
            const container = document.getElementById('block-container-nucleares');
            container.innerHTML = `
                <div class="module-row-header">
                    <span>1. TRÁFICO Y EMBARQUES</span>
                    <button class="btn-action" style="background:#2563eb;" onclick="addParent()">➕ Añadir Concepto Principal</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%">ID</th>
                            <th style="width: 50%">Concepto / Lineamiento</th>
                            <th style="width: 20%">Calificación Estricta</th>
                            <th style="width: 20%">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-data"></tbody>
                </table>
            `;

            const tbody = document.getElementById('tbody-data');

            conceptos.forEach((parent) => {
                let status = calculateStrictMaturity(parent);

                // Fila Padre
                const trP = document.createElement('tr');
                trP.className = "row-parent";
                trP.innerHTML = `
                    <td>P-${parent.id}</td>
                    <td><input type="text" value="${parent.texto || ''}" onchange="updateParentText(${parent.id}, this.value)"></td>
                    <td>
                        ${parent.subconceptos_hijo.length > 0 ? 
                            `<span class="badge-calculated badge-${status}">${status}</span>` :
                            `<select class="badge-${status}" onchange="updateParentEvalManual(${parent.id}, this.value)">
                                <option value="NR" ${status==='NR'?'selected':''}>NR</option>
                                <option value="FI" ${status==='FI'?'selected':''}>FI</option>
                                <option value="LI" ${status==='LI'?'selected':''}>LI</option>
                                <option value="PI" ${status==='PI'?'selected':''}>PI</option>
                                <option value="NY" ${status==='NY'?'selected':''}>NY</option>
                            </select>`
                        }
                    </td>
                    <td><button class="btn-action" style="background:#16a34a;" onclick="addChild(${parent.id})">➕ Añadir Hijo</button></td>
                `;
                tbody.appendChild(trP);

                // Filas Hijos
                parent.subconceptos_hijo.forEach(child => {
                    const trC = document.createElement('tr');
                    trC.className = "row-child";
                    trC.innerHTML = `
                        <td>↳ H-${child.id}</td>
                        <td><input type="text" value="${child.texto || ''}" onchange="updateChildText(${child.id}, this.value)"></td>
                        <td>
                            <select class="badge-${child.eval}" onchange="updateChildEval(${child.id}, this.value)">
                                <option value="NR" ${child.eval==='NR'?'selected':''}>NR</option>
                                <option value="FI" ${child.eval==='FI'?'selected':''}>FI</option>
                                <option value="LI" ${child.eval==='LI'?'selected':''}>LI</option>
                                <option value="PI" ${child.eval==='PI'?'selected':''}>PI</option>
                                <option value="NY" ${child.eval==='NY'?'selected':''}>NY</option>
                            </select>
                        </td>
                        <td></td>
                    `;
                    tbody.appendChild(trC);
                });
            });
        }

        // ESCRIBIR EN LA NUBE (Mutaciones Cloud con Tenant Aislado)
        async function addParent() {
            const cliente = getClienteId();
            await _supabase.from('conceptos_padre').insert([{ modulo_key: modKey, cliente_id: cliente, texto: 'Nuevo Requerimiento Operativo' }]);
            loadData();
        }

        async function addChild(padreId) {
            await _supabase.from('subconceptos_hijo').insert([{ padre_id: padreId, texto: 'Nuevo Lineamiento Específico', eval: 'NR' }]);
            loadData();
        }

        async function updateChildEval(childId, newEval) {
            await _supabase.from('subconceptos_hijo').update({ eval: newEval }).eq('id', childId);
            loadData(); 
        }

        async function updateParentEvalManual(padreId, newEval) {
            await _supabase.from('conceptos_padre').update({ eval_manual: newEval }).eq('id', padreId);
            loadData();
        }

        async function updateParentText(id, text) { await _supabase.from('conceptos_padre').update({ texto: text }).eq('id', id); }
        async function updateChildText(id, text) { await _supabase.from('subconceptos_hijo').update({ texto: text }).eq('id', id); }
        
        function switchTab(e, id) { }

        // Inicializar
        window.onload = loadData;
    </script>
</body>
</html>
